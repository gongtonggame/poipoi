<!DOCTYPE html>
<html>
  <head>
  </head>
  <body>
    <p id="text"></p>
    <script>
    const isOn = true; // ←ここを手動で変更（true=ON / false=OFF）
    
    const text = document.getElementById("text");
    
    if (isOn) {
      text.textContent = "ON";
    } else {
      text.textContent = "OFF";
    }
    </script>
  </body>
</html>
