<!DOCTYPE html>
<html>
  <head>
    <style>
      #time {
        font-size: 70px;   /* 大きくする */
        font-weight: bold;
        text-align: center;
        margin-top: 20%;
      }
    </style>
  </head>
  <body>
    <div id="time"></div>

    <script>
      const now = new Date();
      const timeString = now.toLocaleTimeString();

      document.getElementById("time").textContent = timeString;
    </script>
  </body>
</html>
