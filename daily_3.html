<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        background-color: black;
        color: white;
        text-align: center;
        font-family: sans-serif;
      }

      #datetime {
        font-size: 60px;
        font-weight: bold;
        margin-top: 20%;
      }
    </style>
  </head>
  <body>
    <div id="datetime"></div>

    <script>
      const now = new Date();

      const formatted =
        now.getFullYear() + "年" +
        (now.getMonth() + 1) + "月" +
        now.getDate() + "日 " +
        now.toLocaleTimeString();

      document.getElementById("datetime").textContent = formatted;
    </script>
  </body>
</html>
